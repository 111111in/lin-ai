<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="60" cy="60" r="58" fill="url(#gradient-bg)" opacity="0.1"/>
  
  <!-- 外圈 - AI 芯片边框 -->
  <rect x="20" y="20" width="80" height="80" rx="16" stroke="url(#gradient-primary)" stroke-width="4" fill="none"/>
  
  <!-- 内部连接线 - 科技感 -->
  <path d="M30 30 L42 42 M70 30 L58 42 M30 90 L42 78 M70 90 L58 78" 
        stroke="url(#gradient-secondary)" 
        stroke-width="3" 
        stroke-linecap="round" 
        opacity="0.5"/>
  
  <!-- L 字母主体 -->
  <path d="M38 38 L38 82 L68 82" 
        stroke="url(#gradient-primary)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- AI 智能点 1 -->
  <circle cx="82" cy="45" r="6" fill="url(#gradient-accent)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- AI 智能点 2 -->
  <circle cx="82" cy="75" r="6" fill="url(#gradient-secondary)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 中心装饰点 -->
  <circle cx="53" cy="60" r="4" fill="url(#gradient-primary)" opacity="0.7"/>
  
  <!-- 渐变定义 -->
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="gradient-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(200, 90%, 50%);stop-opacity:1" />
      <stop offset="50%" style="stop-color:hsl(280, 100%, 60%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(330, 100%, 65%);stop-opacity:1" />
    </linearGradient>
    
    <!-- 主色渐变 -->
    <linearGradient id="gradient-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(200, 90%, 50%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(165, 80%, 45%);stop-opacity:1" />
    </linearGradient>
    
    <!-- 次色渐变 -->
    <linearGradient id="gradient-secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(150, 75%, 45%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(165, 80%, 45%);stop-opacity:1" />
    </linearGradient>
    
    <!-- 强调色渐变 -->
    <linearGradient id="gradient-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(165, 80%, 45%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(200, 90%, 50%);stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>

